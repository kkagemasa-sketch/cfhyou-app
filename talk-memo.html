<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トークメモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Yu Gothic UI',Meiryo,sans-serif;background:#1e293b;color:#e2e8f0;font-size:14px}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
header .title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
header .client{font-size:12px;font-weight:600;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toolbar{background:#0f172a;padding:8px 10px;display:flex;gap:6px;border-bottom:1px solid #334155;flex-shrink:0}
.toolbar button{flex:1;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:6px 8px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.toolbar button:hover{background:#475569}
.toolbar button.clear-btn{background:#7c2d12;border-color:#9a3412}
.toolbar button.clear-btn:hover{background:#9a3412}

.list{flex:1;overflow-y:auto;padding:10px 10px 4px}
.empty{text-align:center;color:#64748b;padding:40px 20px;font-size:12px;line-height:1.7}
.empty .big{font-size:32px;margin-bottom:10px}

.item{background:#334155;border:1px solid #475569;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;cursor:grab;transition:.15s;position:relative}
.item:hover{background:#3f4f68;border-color:#64748b}
.item.dragging{opacity:.4;cursor:grabbing}
.item.drag-over{border-top:3px solid #f59e0b;padding-top:6px}
.item.done{opacity:.55;background:#1e293b}
.item.done .text{text-decoration:line-through;color:#94a3b8}

.item .handle{color:#64748b;font-size:14px;cursor:grab;user-select:none;padding-top:2px;flex-shrink:0}
.item .cb{width:18px;height:18px;flex-shrink:0;margin-top:1px;cursor:pointer;accent-color:#f59e0b}
.item .text{flex:1;font-size:13px;line-height:1.5;word-break:break-word;outline:none;min-height:18px}
.item .text[contenteditable="true"]:focus{background:#0f172a;border-radius:4px;padding:2px 4px;margin:-2px -4px}
.item .del{color:#94a3b8;background:transparent;border:none;cursor:pointer;font-size:16px;padding:0 4px;opacity:0;transition:.15s;flex-shrink:0}
.item:hover .del{opacity:1}
.item .del:hover{color:#ef4444}

.addbar{flex-shrink:0;padding:8px 10px 12px;border-top:1px solid #334155;background:#0f172a}
.addbar button{width:100%;background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(245,158,11,.3);transition:.15s}
.addbar button:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(245,158,11,.5)}

.footer{flex-shrink:0;background:#0f172a;color:#64748b;font-size:10px;padding:5px 10px;text-align:center;border-top:1px solid #334155}
.footer .saved{color:#10b981}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>
<header>
  <div class="title">📝 トークメモ</div>
  <div class="client" id="client-name">―</div>
</header>

<div class="toolbar">
  <button onclick="clearCompleted()" class="clear-btn" title="チェック済み項目をすべて削除">✓ 完了をクリア</button>
  <button onclick="clearAll()" title="全項目を削除">🗑 全削除</button>
</div>

<div class="list" id="list">
  <div class="empty" id="empty-msg">
    <div class="big">📝</div>
    項目がありません<br>
    <small>下の「＋ 項目を追加」から追加してください</small>
  </div>
</div>

<div class="addbar">
  <button onclick="addItem()">＋ 項目を追加</button>
</div>

<div class="footer"><span id="save-status" class="saved">🔄 自動保存</span></div>

<script>
let currentClient = '';
let items = [];
let dragSrcId = null;

// BroadcastChannelでメインウィンドウと通信
const ch = new BroadcastChannel('cf-app-talk-memo');
ch.onmessage = (e) => {
  if(e.data.type === 'client-changed'){
    currentClient = e.data.clientName || '';
    document.getElementById('client-name').textContent = currentClient || '（未設定）';
    load();
  }
};
// 起動時にメイン側へ現在のクライアント名を要求
ch.postMessage({type: 'request-client'});

function storageKey(){ return 'talkMemo_' + (currentClient || '__default__'); }

function load(){
  try{
    const raw = localStorage.getItem(storageKey());
    items = raw ? JSON.parse(raw) : [];
  }catch(e){ items = []; }
  render();
}

function save(){
  try{
    localStorage.setItem(storageKey(), JSON.stringify(items));
    const el = document.getElementById('save-status');
    el.textContent = '✓ 保存しました';
    setTimeout(()=>{ el.textContent = '🔄 自動保存'; }, 1200);
  }catch(e){}
}

function render(){
  const list = document.getElementById('list');
  const empty = document.getElementById('empty-msg');
  // 既存の.itemを削除
  list.querySelectorAll('.item').forEach(el=>el.remove());
  if(items.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  items.forEach((it, idx)=>{
    const div = document.createElement('div');
    div.className = 'item' + (it.done ? ' done' : '');
    div.draggable = true;
    div.dataset.id = it.id;
    div.innerHTML = `
      <span class="handle">⋮⋮</span>
      <input type="checkbox" class="cb" ${it.done?'checked':''}>
      <div class="text" contenteditable="true" spellcheck="false"></div>
      <button class="del" title="削除">×</button>
    `;
    const textEl = div.querySelector('.text');
    textEl.textContent = it.text || '';
    // チェックボックス
    div.querySelector('.cb').addEventListener('change', (ev)=>{
      it.done = ev.target.checked;
      save();
      render();
    });
    // テキスト編集
    textEl.addEventListener('blur', ()=>{
      it.text = textEl.textContent.trim();
      save();
    });
    textEl.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter' && !ev.shiftKey){
        ev.preventDefault();
        textEl.blur();
        // Enterで次の項目を自動追加（末尾で空欄になっているときだけ）
        if(idx === items.length - 1 && it.text){
          addItem();
        }
      }
    });
    // 削除
    div.querySelector('.del').addEventListener('click', ()=>{
      items = items.filter(x => x.id !== it.id);
      save();
      render();
    });
    // ドラッグ
    div.addEventListener('dragstart', (ev)=>{
      dragSrcId = it.id;
      div.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', ()=>{
      div.classList.remove('dragging');
      document.querySelectorAll('.item').forEach(el=>el.classList.remove('drag-over'));
    });
    div.addEventListener('dragover', (ev)=>{
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', ()=>{
      div.classList.remove('drag-over');
    });
    div.addEventListener('drop', (ev)=>{
      ev.preventDefault();
      div.classList.remove('drag-over');
      if(dragSrcId == null || dragSrcId === it.id) return;
      const srcIdx = items.findIndex(x => x.id === dragSrcId);
      const dstIdx = items.findIndex(x => x.id === it.id);
      if(srcIdx < 0 || dstIdx < 0) return;
      const [moved] = items.splice(srcIdx, 1);
      items.splice(dstIdx, 0, moved);
      dragSrcId = null;
      save();
      render();
    });
    list.appendChild(div);
  });
}

function addItem(){
  const id = Date.now() + Math.floor(Math.random()*1000);
  items.push({id, text:'', done:false});
  save();
  render();
  // 最後の項目にフォーカス
  const list = document.getElementById('list');
  const lastItem = list.querySelectorAll('.item .text');
  if(lastItem.length){
    const el = lastItem[lastItem.length - 1];
    el.focus();
  }
}

function clearCompleted(){
  const n = items.filter(x=>x.done).length;
  if(n === 0){ alert('チェック済みの項目がありません'); return; }
  if(!confirm(`チェック済み ${n} 件を削除しますか？`)) return;
  items = items.filter(x => !x.done);
  save();
  render();
}

function clearAll(){
  if(items.length === 0) return;
  if(!confirm(`すべての項目 (${items.length} 件) を削除しますか？`)) return;
  items = [];
  save();
  render();
}

// 初回読み込み
load();

// 他ウィンドウで同一clientのデータが変更されたら反映
window.addEventListener('storage', (e)=>{
  if(e.key === storageKey()) load();
});
</script>
</body>
</html>
