<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 白背景 -->
  <rect width="64" height="64" fill="#ffffff"/>
  <!-- 屋根（紺色三角） -->
  <polygon points="32,4 4,28 60,28" fill="#2d3d8a"/>
  <!-- 煙突 -->
  <rect x="40" y="10" width="6" height="14" rx="1" fill="#2d3d8a"/>
  <!-- 家の本体（ティール） -->
  <rect x="8" y="27" width="48" height="33" rx="2" fill="#1aac9c"/>
  <!-- グリッド横線 -->
  <line x1="8" y1="38" x2="56" y2="38" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="8" y1="48" x2="56" y2="48" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- グリッド縦線 -->
  <line x1="24" y1="27" x2="24" y2="60" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="27" x2="40" y2="60" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- 電卓ボタン（ドット） -->
  <rect x="12" y="31" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="27" y="31" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="44" y="31" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="12" y="41" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="27" y="41" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="44" y="41" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="12" y="51" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="27" y="51" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="44" y="51" width="7" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
</svg>
